version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: deep-colony-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: deep-colony-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGIN=http://localhost:8080
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: client/Dockerfile
    container_name: deep-colony-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  redis_data:
